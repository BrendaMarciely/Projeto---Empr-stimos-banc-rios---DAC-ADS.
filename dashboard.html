<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Impulso Financeiro</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-arrow-trend-up"></i>
                <span>Impulso Financeiro</span>
            </div>
            <nav>
                <a href="dashboard.html" class="active"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="emprestimos.html"><i class="fa-solid fa-building-columns"></i> Empréstimos</a>
                <a href="contratos.html"><i class="fa-solid fa-file-contract"></i> Contratos</a>
                <a href="cronograma.html"><i class="fa-solid fa-calendar"></i> Cronograma</a>
                <a href="desembolsos.html"><i class="fa-solid fa-money-bill"></i> Desembolsos</a>
                <a href="pagamentos.html"><i class="fa-solid fa-credit-card"></i> Pagamentos</a>
                <a href="renegociacoes.html"><i class="fa-solid fa-rotate"></i> Renegociações</a>
                <a href="notificacoes.html"><i class="fa-solid fa-bell"></i> Notificações</a>
                <a href="relatorios.html"><i class="fa-solid fa-chart-column"></i> Relatórios</a>
            </nav>
            <div class="logout">
                <a href="#" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </a>
            </div>
        </aside>

        <main class="content">
            <div class="banner-dashboard">
                <div class="banner-texto">
                    <h1>Dashboard</h1>
                    <p>Visão geral dos seus empréstimos e finanças.</p>
                    <p id="bemVindoUsuario" style="font-weight: bold; margin-top: 10px;"></p>
                </div>
            </div>

            <div class="cards">
                <div class="card">
                    <div class="card-header">
                        <span>Empréstimos Ativos</span>
                        <i class="fa-solid fa-building-columns blue"></i>
                    </div>
                    <div class="card-value" id="cardTotalPedidos">
                        0
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>Total da Dívida</span>
                        <i class="fa-solid fa-dollar-sign red"></i>
                    </div>
                    <div class="card-value" id="cardSomaTotal">
                        R$ 0,00
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>Parcelas Próximas</span>
                        <i class="fa-solid fa-calendar-check orange"></i>
                    </div>
                    <div class="card-value">
                        5
                    </div>
                    <p>Nos próximos 30 dias</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span>Bancos Parceiros</span>
                        <i class="fa-solid fa-landmark blue"></i>
                    </div>
                    <div class="card-value" id="cardQtdCredores">
                        0
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ⭐ MOSTRAR NOME DO USUÁRIO
        const usuarioObj = JSON.parse(localStorage.getItem("usuarioLogado"))
        if (usuarioObj) {
            document.getElementById("bemVindoUsuario").innerText = "Bem-vindo(a), " + usuarioObj.nome
        }

        // ⭐ CARREGAR DADOS REAIS DO BANCO
        async function carregarDashboard() {
            try {
                const resposta = await fetch("https://projeto-empr-stimos-banc-rios-dac-ads-production.up.railway.app/dashboard_resumo");
                const dados = await resposta.json();

                // Atualiza os Cards com os dados do Backend
                document.getElementById("cardTotalPedidos").innerText = dados.total_pedidos || 0;
                document.getElementById("cardQtdCredores").innerText = dados.total_credores || 0;

                const valorTotal = Number(dados.soma_total || 0).toLocaleString('pt-BR', {
                    style: 'currency',
                    currency: 'BRL'
                });
                document.getElementById("cardSomaTotal").innerText = valorTotal;

            } catch (e) {
                console.error("Erro ao carregar dashboard:", e);
            }
        }

        // ⭐ LOGOUT REAL
        function logout() {
            localStorage.removeItem("usuarioLogado")
            window.location.href = "login.html"
        }

        // Iniciar carregamento
        window.onload = carregarDashboard;
    </script>

</body>
</html>
