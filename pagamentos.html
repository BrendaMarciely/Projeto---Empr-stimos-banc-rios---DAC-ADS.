<!-- CONTEÚDO -->

<main class="content">

<div class="header">
<h1>Pagamentos</h1>
</div>


<!-- CARD REGISTRAR PAGAMENTO -->

<div class="card">

<h2>Registrar Pagamento</h2>

<div class="form-grid">

<div class="campo">
<label>Contrato</label>
<select id="contratoSelect">
<option value="">Selecione o contrato</option>
<option value="Banco do Brasil">Banco do Brasil</option>
<option value="Itaú">Itaú</option>
<option value="Bradesco">Bradesco</option>
<option value="BNDES">BNDES</option>
<option value="Santander">Santander</option>
</select>
</div>

<div class="campo">
<label>Valor Pago</label>
<input type="number" id="valorPago">
</div>

<div class="campo">
<label>Data do Pagamento</label>
<input type="date" id="dataPagamento">
</div>

<div class="campo">
<label>Juros / Encargos</label>
<input type="number" id="juros">
</div>

<div class="botoes">

<button class="btn-save" onclick="registrarPagamento()">
Registrar Pagamento
</button>

</div>

</div>

</div>


<!-- CARD HISTÓRICO -->

<div class="card" style="margin-top:20px;">

<h2>Pagamentos Recentes</h2>

<table class="tabela-pagamentos">

<thead>

<tr>

<th>Contrato</th>
<th>Valor Pago</th>
<th>Data</th>
<th>Juros/Encargos</th>

</tr>

</thead>

<tbody id="tabelaPagamentos">
</tbody>

</table>

</div>

</main>

</div>



<script>


async function registrarPagamento(){

const credor = document.getElementById("contratoSelect").value
const valor = document.getElementById("valorPago").value
const data = document.getElementById("dataPagamento").value

const resposta = await fetch("http://127.0.0.1:5000/registrar_pagamento",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ credor, valor, data })
})

const dados = await resposta.json()

alert(dados.msg)

carregarPagamentos()

}

async function carregarPagamentos(){

const tabela = document.getElementById("tabelaPagamentos")

const resposta = await fetch("http://127.0.0.1:5000/listar_pagamentos")
const dados = await resposta.json()

tabela.innerHTML = ""

dados.forEach(p=>{
tabela.innerHTML += `
<tr>
<td>${p.credor}</td>
<td>${p.valor}</td>
<td>${p.data}</td>
<td>${p.juros}</td>
</tr>
`
})

}

carregarPagamentos()

</script>
