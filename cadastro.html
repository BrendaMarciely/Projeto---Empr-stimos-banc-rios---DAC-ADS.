<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Impulso Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="login-card">

            <div class="logo-area">
                <div class="logo-icon">↗</div>
                <div>
                    <h1>Impulso Financeiro</h1>
                    <p>Crie sua conta</p>
                </div>
            </div>

            <form id="formCadastro">

                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>

                <label>E-mail</label>
                <input type="email" id="login" placeholder="seu@email.com" required>

                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
                <small style="color: #666; display: block; margin-bottom: 10px; font-size: 11px;">
                    Mínimo 8 caracteres, uma letra maiúscula, um número e um símbolo.
                </small>

                <label>Confirmar Senha</label>
                <input type="password" id="confirmarSenha" placeholder="••••••••" required>

                <label>Perfil de Acesso</label>
                <select id="perfil">
                    <option value="Tesouraria / Financeiro">Tesouraria / Financeiro</option>
                    <option value="Gestor Financeiro">Gestor Financeiro</option>
                    <option value="Contabilidade">Contabilidade</option>
                    <option value="Compliance / Auditoria">Compliance / Auditoria</option>
                    <option value="Administrador do Sistema">Administrador do Sistema</option>
                    <option value="Financeira Externa">Financeira Externa</option>
                </select>

                <button type="button" onclick="cadastrar()">Criar Conta</button>

            </form>

            <div class="register">
                Já tem uma conta?
                <a href="login.html">Entrar</a>
            </div>

        </div>
    </div>

    <script>
        async function cadastrar() {
            // Captura os valores
            const nome = document.getElementById("nome").value.trim();
            const login = document.getElementById("login").value.trim();
            const senha = document.getElementById("senha").value;
            const confirmar = document.getElementById("confirmarSenha").value;
            const perfil = document.getElementById("perfil").value;

            // --- REGRA 1: CAMPOS OBRIGATÓRIOS ---
            if (!nome || !login || !senha || !confirmar) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            // --- REGRA 2: VALIDAÇÃO DE SENHA FORTE (REGEX) ---
            // Mínimo 8 caracteres, 1 maiúscula, 1 número, 1 caractere especial
            const regexSenhaForte = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            
            if (!regexSenhaForte.test(senha)) {
                alert("Senha muito fraca!\n\nA senha deve conter pelo menos:\n- 8 caracteres\n- 1 letra maiúscula\n- 1 número\n- 1 caractere especial (@$!%*?&)");
                return;
            }

            // --- REGRA 3: CONCORDÂNCIA DE SENHAS ---
            if (senha !== confirmar) {
                alert("As senhas não coincidem.");
                return;
            }

            try {
                const resposta = await fetch("https://projeto-empr-stimos-banc-rios-dac-ads-production.up.railway.app/cadastrar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nome,
                        login,
                        senha,
                        perfil
                    })
                });

                const dados = await resposta.json();

                // --- REGRA 4: VERIFICAÇÃO DE SUCESSO NO REDIRECIONAMENTO ---
                if (resposta.ok && dados.msg.toLowerCase().includes("sucesso")) {
                    alert("✅ " + dados.msg);
                    window.location.href = "login.html";
                } else {
                    alert("❌ Erro: " + (dados.msg || "Falha ao realizar cadastro."));
                }

            } catch (e) {
                alert("Erro ao conectar com o servidor. Verifique sua conexão.");
                console.log(e);
            }
        }
    </script>

</body>
</html>
