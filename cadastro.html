<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Impulso Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="login-card">

            <div class="logo-area">
                <div class="logo-icon">↗</div>

                <div>
                    <h1>Impulso Financeiro</h1>
                    <p>Crie sua conta</p>
                </div>
            </div>

            <form>

                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Seu nome completo" required>

                <label>E-mail</label>
                <input type="email" id="login" placeholder="seu@email.com" required>

                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>

                <label>Confirmar Senha</label>
                <input type="password" id="confirmarSenha" placeholder="••••••••" required>

                <label>Perfil de Acesso</label>
                <select id="perfil">
                    <option value="Tesouraria / Financeiro">Tesouraria / Financeiro</option>
                    <option value="Gestor Financeiro">Gestor Financeiro</option>
                    <option value="Contabilidade">Contabilidade</option>
                    <option value="Compliance / Auditoria">Compliance / Auditoria</option>
                    <option value="Administrador do Sistema">Administrador do Sistema</option>
                    <option value="Financeira Externa">Financeira Externa</option>
                </select>

                <button type="button" onclick="cadastrar()">Criar Conta</button>

            </form>

            <div class="register">
                Já tem uma conta?
                <a href="login.html">Entrar</a>
            </div>

        </div>
    </div>

    <script>
        async function cadastrar() {

            const nome = document.getElementById("nome").value
            const login = document.getElementById("login").value
            const senha = document.getElementById("senha").value
            const confirmar = document.getElementById("confirmarSenha").value
            
            // CAPTURANDO O VALOR DO PERFIL
            const perfil = document.getElementById("perfil").value

            if (senha !== confirmar) {
                alert("As senhas não coincidem")
                return
            }

            if (!nome || !login || !senha || !perfil) {
                alert("Por favor, preencha todos os campos")
                return
            }

            try {
                const resposta = await fetch("https://projeto-empr-stimos-banc-rios-dac-ads-production.up.railway.app/cadastrar", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nome,
                        login,
                        senha,
                        perfil // ENVIANDO O PERFIL PARA O BACKEND
                    })
                })

                const dados = await resposta.json()
                alert(dados.msg)

                if (dados.msg.includes("sucesso")) {
                    window.location.href = "login.html"
                }

            } catch (e) {
                alert("Erro ao conectar com o servidor")
                console.log(e)
            }
        }
    </script>

</body>
</html>
