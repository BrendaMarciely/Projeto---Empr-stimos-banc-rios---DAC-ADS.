<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Empréstimos | Impulso Financeiro</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="emprestimos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <i class="fa-solid fa-arrow-trend-up"></i>
                    <span>Impulso Financeiro</span>
                </div>
                <nav>
    <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
    <a href="emprestimos.html"><i class="fa-solid fa-building-columns"></i> Empréstimos</a>
    <a href="contratos.html"><i class="fa-solid fa-file-contract"></i> Contratos</a>
    <a href="cronograma.html"><i class="fa-solid fa-calendar"></i> Cronograma</a>
    <a href="desembolsos.html"><i class="fa-solid fa-money-bill"></i> Desembolsos</a>
    <a href="pagamentos.html"><i class="fa-solid fa-credit-card"></i> Pagamentos</a>
    <a href="renegociacoes.html"><i class="fa-solid fa-rotate"></i> Renegociações</a>
    <a href="notificacoes.html"><i class="fa-solid fa-bell"></i> Notificações</a>
    <a href="relatorios.html"><i class="fa-solid fa-chart-column"></i> Relatórios</a>
    <a href="administracao.html"><i class="fa-solid fa-user-gear"></i> Administração</a>
</nav>
            </div>
            <div class="logout">
                <a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </div>
        </aside>

        <main class="content">
            <div class="header">
                <h1>Gestão de Empréstimos</h1>
                <button class="btn-add" onclick="window.location.href='cadastro-emprestimo.html'">
                    <i class="fa-solid fa-plus"></i> Cadastrar Empréstimo
                </button>
            </div>

            <div class="filters">
                <div class="search">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Buscar por credor..." id="buscaCredor">
                </div>
                <select id="filtroStatus" class="filtro-status">
                    <option value="todos">Todos</option>
                    <option value="ativo">Ativo</option>
                    <option value="encerrado">Encerrado</option>
                </select>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Credor</th>
                        <th>Valor</th>
                        <th>Taxa</th>
                        <th>Início</th>
                        <th>Término</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaEmprestimos">
                </tbody>
            </table>
        </main>
    </div>

    <script>
        // --- FUNÇÃO PARA CARREGAR DADOS DO BACKEND ---
        async function carregarEmprestimos() {
            try {
                const resposta = await fetch("https://projeto-empr-stimos-banc-rios-dac-ads-production.up.railway.app/listar_emprestimos");
                const dados = await resposta.json();
                const tabela = document.getElementById("tabelaEmprestimos");
                tabela.innerHTML = "";

                dados.forEach(emp => {
                    const dataInicio = new Date(emp.data).toLocaleDateString("pt-BR");
                    const dataFim = new Date(emp.vencimento).toLocaleDateString("pt-BR");

                    const statusClass = emp.status.toLowerCase() === 'ativo' ? 'active' : 'inactive';

                    tabela.innerHTML += `
                        <tr>
                            <td>${emp.credor}</td>
                            <td>R$ ${Number(emp.valor).toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</td>
                            <td>${emp.taxa_juros}% a.a.</td>
                            <td>${dataInicio}</td>
                            <td>${dataFim}</td>
                            <td><span class="status ${statusClass}">${emp.status}</span></td>
                            <td>
                                <button class="btn-action edit" onclick="editarEmprestimo(${emp.emprestimo_id})" title="Editar">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button class="btn-action delete" onclick="excluirEmprestimo(${emp.emprestimo_id})" title="Excluir">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.log(e);
                alert("Erro ao carregar empréstimos");
            }
        }

        // --- FUNÇÃO PARA REDIRECIONAR PARA EDIÇÃO ---
        function editarEmprestimo(id) {
            // Manda o usuário para a nova tela levando o ID na URL
            window.location.href = `editar-emprestimo.html?id=${id}`;
        }

        // --- FUNÇÃO PARA EXCLUIR ---
        async function excluirEmprestimo(id) {
            if (confirm("Tem certeza que deseja excluir este empréstimo?")) {
                try {
                    const resposta = await fetch(`https://projeto-empr-stimos-banc-rios-dac-ads-production.up.railway.app/excluir_emprestimo/${id}`, {
                        method: 'DELETE'
                    });
                    const resultado = await resposta.json();

                    alert(resultado.msg);
                    carregarEmprestimos();
                } catch (e) {
                    alert("Erro ao excluir empréstimo.");
                }
            }
        }

        // --- FUNÇÃO PARA FILTROS ---
        function aplicarFiltro() {
            const texto = document.getElementById("buscaCredor").value.toLowerCase();
            const statusSelecionado = document.getElementById("filtroStatus").value;
            const linhas = document.querySelectorAll("#tabelaEmprestimos tr");

            linhas.forEach(linha => {
                const credor = linha.children[0].textContent.toLowerCase();
                const status = linha.children[5].textContent.toLowerCase();
                let mostrar = credor.includes(texto);
                if (statusSelecionado !== "todos" && status !== statusSelecionado) mostrar = false;
                linha.style.display = mostrar ? "" : "none";
            });
        }

        document.getElementById("buscaCredor").addEventListener("keyup", aplicarFiltro);
        document.getElementById("filtroStatus").addEventListener("change", aplicarFiltro);

        carregarEmprestimos();
    </script>

</body>

</html>
