<main class="content">

<div class="header">

<h1>Nova Renegociação</h1>

</div>


<div class="card">

<h2>Registrar Renegociação ou Liquidação</h2>


<form class="form-grid">

<div class="campo">

<label>Contrato</label>

<select>

<option>Selecione o contrato</option>
<option>Bradesco</option>
<option>Santander</option>
<option>Itaú</option>

</select>

</div>


<div class="campo">

<label>Tipo</label>

<select>

<option>Selecione</option>
<option>Renegociação</option>
<option>Liquidação</option>

</select>

</div>


<div class="campo">

<label>Nova Taxa</label>

<input type="text" placeholder="Ex: 10,5% a.a.">

</div>


<div class="campo">

<label>Novo Prazo (meses)</label>

<input type="number" placeholder="48">

</div>


<div class="campo-full">

<label>Observações</label>

<textarea placeholder="Detalhes da renegociação ou quitação..."></textarea>

</div>


<div class="botoes">

<button class="btn-save">
Salvar
</button>

<a href="renegociacoes.html" class="btn-cancel">
Cancelar
</a>

</div>


</form>

</div>
