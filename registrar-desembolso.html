href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<a href="contratos.html">

Contratos
</a>

<a href="cronograma.html">
<i class="fa-solid fa-calendar"></i>

</a>

<a href="desembolsos.html" class="active">
<i class="fa-solid fa-money-bill"></i>
Desembolsos

<!-- CONTEÚDO -->

<main class="content">

<div class="header">
<h1>Novo Desembolso</h1>
</div>


<div class="card">

<h2>Registrar Desembolso</h2>

<div class="form-grid">

<div class="campo">
<label>Contrato</label>
<select>
<option>Selecione o contrato</option>
<option>BNDES</option>
<option>Itaú</option>
<option>Banco do Brasil</option>
</select>
</div>

<div class="campo">
<label>Tipo de Liberação</label>
<select>
<option>Selecione</option>
<option>Parcial</option>
<option>Total</option>
</select>
</div>

<div class="campo">
<label>Valor Liberado</label>
<input type="text" placeholder="R$ 0,00">
</div>

<div class="campo">
<label>Data da Liberação</label>
<input type="date">
</div>

<div class="campo-full">
<label>Custos / Tarifas</label>
<input type="text" placeholder="R$ 0,00">
</div>

<div class="botoes">

<button class="btn-save">
Salvar
</button>

<a href="desembolsos.html" class="btn-cancel">
Cancelar
</a>

</div>

</div>

</div>

</main>

</div>

</body>
