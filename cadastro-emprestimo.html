<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastrar Empréstimo</title>

<!-- CSS da tela de empréstimos -->
<link rel="stylesheet" href="emprestimos.css">

</head>

<body>

<!-- ========================================= -->
<!-- CONTAINER PRINCIPAL DA TELA               -->
<!-- Centraliza o formulário na página         -->
<!-- ========================================= -->

<div class="cadastro-container">

<div class="cadastro-card">

<h2>Cadastrar Empréstimo</h2>

<p>Preencha os dados do empréstimo</p>

<form>

<!-- CREDOR -->

<label>Credor</label>
<input type="text" placeholder="Ex: Banco do Brasil">


<!-- VALOR -->

<label>Valor do Empréstimo</label>
<input type="number" placeholder="Ex: 500000">


<!-- TAXA -->

<label>Taxa de Juros (% ao ano)</label>
<input type="number" step="0.01" placeholder="Ex: 12.5">


<!-- DATA INÍCIO -->

<label>Data de Início</label>
<input type="date">


<!-- DATA TÉRMINO -->

<label>Data de Término</label>
<input type="date">


<!-- STATUS -->

<label>Status</label>

<select>

<option>Ativo</option>
<option>Encerrado</option>

</select>


<!-- BOTÕES -->

<div class="botoes">

<button type="button"
onclick="window.location.href='emprestimos.html'">

Salvar

</button>

<a href="emprestimos.html" class="cancelar">

Cancelar

</a>

</div>

</form>

</div>

</div>

</body>
</html>
