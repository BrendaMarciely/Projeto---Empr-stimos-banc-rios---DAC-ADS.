<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Novo Contrato | Impulso Financeiro</title>

<link rel="stylesheet" href="contratos.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="layout">

<!-- SIDEBAR PADRÃO -->

<aside class="sidebar">

<div class="logo">
<i class="fa-solid fa-arrow-trend-up"></i>
<span>Impulso Financeiro</span>
</div>

<nav>

<a href="dashboard.html">
<i class="fa-solid fa-table-columns"></i>
Dashboard
</a>

<a href="emprestimos.html">
<i class="fa-solid fa-building-columns"></i>
Empréstimos
</a>

<a href="contratos.html" class="active">
<i class="fa-solid fa-file-contract"></i>
Contratos
</a>

<a href="cronograma.html">
<i class="fa-solid fa-calendar"></i>
Cronograma
</a>

<a href="desembolsos.html">
<i class="fa-solid fa-money-bill"></i>
Desembolsos
</a>

<a href="pagamentos.html">
<i class="fa-solid fa-credit-card"></i>
Pagamentos
</a>

<a href="renegociacoes.html">
<i class="fa-solid fa-rotate"></i>
Renegociações
</a>

<a href="notificacoes.html">
<i class="fa-solid fa-bell"></i>
Notificações
</a>

<a href="relatorios.html">
<i class="fa-solid fa-chart-column"></i>
Relatórios
</a>

</nav>

<div class="logout">
<a href="index.html">
<i class="fa-solid fa-right-from-bracket"></i>
Sair
</a>
</div>

</aside>

<!-- CONTEÚDO -->

<main class="content">

<div class="header">

<h1>Novo Contrato</h1>

<a href="contratos.html" class="btn-add">
<i class="fa-solid fa-arrow-left"></i>
Voltar
</a>

</div>

<!-- CARD FORM -->

<div class="card">

<h2>Registrar Contrato</h2>

<form class="form-grid">

<div class="campo">
<label>Credor</label>
<input type="text" placeholder="Nome do credor">
</div>

<div class="campo">
<label>Valor</label>
<input type="text" placeholder="R$ 0,00">
</div>

<div class="campo">
<label>Taxa</label>
<input type="text" placeholder="Ex: 12,5% a.a.">
</div>

<div class="campo">
<label>Indexador</label>
<select>
<option>Selecione</option>
<option>CDI</option>
<option>IPCA</option>
<option>Selic</option>
</select>
</div>

<div class="campo">
<label>Prazo (meses)</label>
<input type="number" value="36">
</div>

<div class="campo-full">
<label>Observações</label>
<textarea placeholder="Notas sobre o contrato, anexos, etc."></textarea>
</div>

<div class="botoes">

<button class="btn-save">
Salvar
</button>

<a href="contratos.html" class="btn-cancel">
Cancelar
</a>

</div>

</form>

</div>

</main>

</div>

</body>
</html>
